name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Tests (unit + Mongo integration)
        run: npm test
        env:
          TIMBER_TEST_MONGODB_URI: mongodb://localhost:27017

      - name: Ingest bench smoke
        run: BENCH_SMOKE=1 node bench/ingest-bench.js
