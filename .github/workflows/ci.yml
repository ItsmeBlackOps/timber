name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Tests (unit + Mongo integration)
        run: npm test
        env:
          TIMBER_TEST_MONGODB_URI: mongodb://localhost:27017

      - name: Ingest bench smoke
        run: BENCH_SMOKE=1 node bench/ingest-bench.js

  # Timber Console (web/) green-gate. The root job above never installs or exercises
  # the SPA — there are no npm workspaces, so root `npm ci` skips web/ entirely — which
  # let a broken `tsc -b`, a failing `vite build`, or a regressed vitest suite ship
  # undetected. This job runs the plan's authoritative green-gate
  # (docs/.../plans/2026-06-14-timber-console.md): typecheck -> test -> build, against
  # the web workspace with its own lockfile install. It runs in parallel with the
  # server job; either failing fails the required `ci` check on a PR.
  web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # web/ has its own package-lock.json (no workspaces); cache it explicitly so
          # the npm cache key is derived from the web lockfile, not just the root one.
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Typecheck (tsc -b)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build (vite)
        run: npm run build
