# Timber — central log service (see README.md / USAGE.md).
#
# Self-contained stack: the `timber` service + a bundled `mongo`. Just provide keys:
#   cp .env.example .env   # then set TIMBER_KEYS
#   docker compose up -d --build
#
# Required env (in `.env`):
#   TIMBER_KEYS   JSON array of API keys, e.g.
#                 [{"key":"w-dd-prod-CHANGE_ME","app":"dailyDashboard","env":"prod","mode":"write"},
#                  {"key":"r-assistant-CHANGE_ME","app":"assistant","env":"prod","mode":"read"}]
#
# Storage: set MONGODB_URI in `.env` (it ships pointing at the bundled mongo below:
#   mongodb://mongo:27017). To use Atlas instead, change it in `.env`
#   (mongodb+srv://user:pass@cluster/...). It is injected via env_file, NOT compose
#   ${...} interpolation, on purpose: interpolation would let an ambient MONGODB_URI
#   exported in the operator's shell silently override the bundled DB. Unset =>
#   ingest still works (events durable in the WAL), queries answer 503 until storage is up.
#
# Optional env (defaults in parentheses — full table in USAGE.md):
#   PORT (7710), TIMBER_HOST (0.0.0.0), TIMBER_DB (appLogs), TIMBER_COLLECTION (events),
#   TIMBER_WAL_DIR (/data/wal in this image), TIMBER_WAL_BUDGET_MB (2048),
#   TIMBER_WAL_FSYNC_MS (50), TIMBER_WAL_SEGMENT_MB (64), TIMBER_WAL_RETAIN_HOURS (24),
#   TIMBER_TTL_DEBUG_DAYS (7), TIMBER_TTL_INFO_DAYS (30),
#   TIMBER_TTL_WARN_DAYS (90), TIMBER_TTL_ERROR_DAYS (90),
#   TIMBER_FLUSH_BATCH (1000), TIMBER_FLUSH_INTERVAL_MS (200),
#   TIMBER_MAX_DATA_KB (64), TIMBER_QUERY_MAX_TIME_MS (5000), TIMBER_CLUSTER (0)

services:
  timber:
    build: .
    image: timber:latest   # deploy: replace with a registry ref and `docker compose pull && up -d`
    # required:false (Compose >= 2.24): a missing .env degrades to a clear in-app
    # config error (startup warning + 401s) instead of a hard compose failure.
    env_file:
      - path: .env
        required: false
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "7710:7710"
    volumes:
      - timber-wal:/data/wal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Bundled MongoDB. Internal to the compose network only (no host port published),
  # so it never clashes with another mongo already on the host's 27017. Reach it from
  # the host for debugging with: docker compose exec mongo mongosh
  mongo:
    image: mongo:8
    command: ["--quiet"]
    volumes:
      - timber-mongo:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  timber-wal:
  timber-mongo:
