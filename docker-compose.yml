# Timber — central log service (see README.md / USAGE.md).
#
# Required env — put these in a `.env` file next to this compose file (never commit it):
#
#   MONGODB_URI   Mongo/Atlas connection string, e.g. mongodb+srv://user:pass@cluster/...
#                 Unset => ingest still works (events durable in the WAL), but query
#                 endpoints answer 503 and the flusher idles until it is set.
#   TIMBER_KEYS   JSON array of API keys, e.g.
#                 [{"key":"w-dd-prod-CHANGE_ME","app":"dailyDashboard","env":"prod","mode":"write"},
#                  {"key":"r-assistant-CHANGE_ME","app":"assistant","env":"prod","mode":"read"}]
#
# Optional env (defaults in parentheses — full table in USAGE.md):
#   PORT (7710), TIMBER_DB (appLogs), TIMBER_COLLECTION (events),
#   TIMBER_WAL_DIR (/data/wal in this image), TIMBER_WAL_BUDGET_MB (2048),
#   TIMBER_WAL_FSYNC_MS (50), TIMBER_WAL_SEGMENT_MB (64), TIMBER_WAL_RETAIN_HOURS (24),
#   TIMBER_TTL_DEBUG_DAYS (7), TIMBER_TTL_INFO_DAYS (30),
#   TIMBER_TTL_WARN_DAYS (90), TIMBER_TTL_ERROR_DAYS (90),
#   TIMBER_FLUSH_BATCH (1000), TIMBER_FLUSH_INTERVAL_MS (200), TIMBER_CLUSTER (0)

services:
  timber:
    build: .
    image: timber:latest   # deploy: replace with a registry ref and `docker compose pull && up -d`
    env_file: .env
    ports:
      - "7710:7710"
    volumes:
      - timber-wal:/data/wal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Local Mongo for development — production uses Atlas via MONGODB_URI.
  # Uncomment this service (and the timber-mongo volume below), then set
  # MONGODB_URI=mongodb://mongo:27017 in .env.
  # mongo:
  #   image: mongo:8
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - timber-mongo:/data/db
  #   restart: unless-stopped

volumes:
  timber-wal:
  # timber-mongo:
