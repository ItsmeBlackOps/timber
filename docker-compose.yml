# Timber — central log service (see README.md / USAGE.md).
#
# Self-contained stack: the `timber` service + a bundled `mongo`. Just provide keys:
#   cp .env.example .env   # then set TIMBER_KEYS
#   docker compose up -d --build
#
# Required env (in `.env`):
#   TIMBER_KEYS   JSON array of API keys, e.g.
#                 [{"key":"w-dd-prod-CHANGE_ME","app":"dailyDashboard","env":"prod","mode":"write"},
#                  {"key":"r-assistant-CHANGE_ME","app":"assistant","env":"prod","mode":"read"}]
#
# Storage: set MONGODB_URI in `.env` (it ships pointing at the bundled mongo below:
#   mongodb://mongo:27017). To use Atlas instead, change it in `.env`
#   (mongodb+srv://user:pass@cluster/...). It is injected via env_file, NOT compose
#   ${...} interpolation, on purpose: interpolation would let an ambient MONGODB_URI
#   exported in the operator's shell silently override the bundled DB. Unset =>
#   ingest still works (events durable in the WAL), queries answer 503 until storage is up.
#
# Optional env (defaults in parentheses — full table in USAGE.md):
#   PORT (7710), TIMBER_HOST (0.0.0.0), TIMBER_DB (appLogs), TIMBER_COLLECTION (events),
#   TIMBER_WAL_DIR (/data/wal in this image), TIMBER_WAL_BUDGET_MB (2048),
#   TIMBER_WAL_FSYNC_MS (50), TIMBER_WAL_SEGMENT_MB (64), TIMBER_WAL_RETAIN_HOURS (24),
#   TIMBER_TTL_DEBUG_DAYS (7), TIMBER_TTL_INFO_DAYS (30),
#   TIMBER_TTL_WARN_DAYS (90), TIMBER_TTL_ERROR_DAYS (90),
#   TIMBER_FLUSH_BATCH (1000), TIMBER_FLUSH_INTERVAL_MS (200),
#   TIMBER_MAX_DATA_KB (64), TIMBER_QUERY_MAX_TIME_MS (5000), TIMBER_CLUSTER (0)

services:
  timber:
    build: .
    # Local dev: `docker compose up --build` builds + tags this. On the VM, set
    # TIMBER_IMAGE=docker.io/<user>/timber:latest in .env, then
    # `docker compose pull && docker compose up -d` pulls the published image.
    image: ${TIMBER_IMAGE:-timber:latest}
    # required:false (Compose >= 2.24): a missing .env degrades to a clear in-app
    # config error (startup warning + 401s) instead of a hard compose failure.
    env_file:
      - path: .env
        required: false
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "7710:7710"
    volumes:
      - timber-wal:/data/wal
    restart: unless-stopped
    labels:
      # Watchtower (see the watchtower service below) auto-updates ONLY containers
      # carrying this label. Mongo intentionally omits it, so the DB is never
      # auto-updated by a Timber image push.
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Bundled MongoDB. Internal to the compose network only (no host port published),
  # so it never clashes with another mongo already on the host's 27017. Reach it from
  # the host for debugging with: docker compose exec mongo mongosh
  mongo:
    image: mongo:8
    command: ["--quiet"]
    volumes:
      - timber-mongo:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Auto-deploy (CD): polls Docker Hub and, when a new TIMBER_IMAGE is pushed, pulls
  # it and recreates ONLY the timber container (same env + timber-wal volume, so
  # unflushed WAL events replay on boot — no accepted-record loss across an update).
  # Scoped by the enable label on `timber` above + WATCHTOWER_LABEL_ENABLE, so it
  # never touches mongo or any other container on the host. Needs the Docker socket
  # (root-equivalent on the host) — inherent to any auto-updater; the label scope
  # limits blast radius. Tune the poll with WATCHTOWER_POLL_INTERVAL in .env
  # (default 300s; mind Docker Hub rate limits). Pause auto-deploy any time with
  # `docker compose stop watchtower`.
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Private TIMBER_IMAGE repo? Run `docker login` on the host, then uncomment to
      # authenticate Watchtower's pulls with those credentials:
      # - ~/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  timber-wal:
  timber-mongo:
